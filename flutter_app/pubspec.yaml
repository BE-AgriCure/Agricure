name: agricare
description: AgriCure - AI-Powered Plant Disease Detection App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera & Image
  camera: ^0.11.3
  image_picker: ^1.0.4
  image: ^4.0.17
  
  # TFLite
  tflite_flutter: ^0.12.1
  
  # Firebase
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  
  # Local Notifications
  flutter_local_notifications: ^19.5.0
  
  # Storage
  shared_preferences: ^2.2.2
  
  # HTTP
  http: ^1.1.0
  
  # Utilities
  intl: ^0.20.2
  permission_handler: ^12.0.1
  geolocator: ^14.0.2
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/model.tflite
    - assets/labels.txt
    - assets/remedies.json
    - assets/accuracy_graph.png
    - assets/loss_graph.png
